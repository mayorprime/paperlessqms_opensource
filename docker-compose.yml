services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paperlessqms
      POSTGRES_USER: paperlessqms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-paperlessqms_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperlessqms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: paperlessqms-spring/Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paperlessqms
      SPRING_DATASOURCE_USERNAME: paperlessqms
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-paperlessqms_secret}
      # Override the hardcoded default — generate with: openssl rand -base64 64
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET: ${JWT_SECRET}
      JHIPSTER_MAIL_BASE_URL: ${BACKEND_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  flutter-apps:
    build:
      context: paperlessqms-flutter
      dockerfile: Dockerfile
      args:
        API_URL: ${BACKEND_URL:-http://localhost:8080}
    ports:
      - "${FLUTTER_PORT:-80}:80"
    restart: unless-stopped

volumes:
  postgres_data:
