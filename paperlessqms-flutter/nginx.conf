server {
    listen 80;
    server_name _;

    # Admin app
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Call display board
    location /call/ {
        alias /usr/share/nginx/html/call/;
        try_files $uri $uri/ /call/index.html;
    }

    # Customer-facing client app
    location /client/ {
        alias /usr/share/nginx/html/client/;
        try_files $uri $uri/ /client/index.html;
    }

    # Kiosk app
    location /kiosk/ {
        alias /usr/share/nginx/html/kiosk/;
        try_files $uri $uri/ /kiosk/index.html;
    }

    # Supervisor app
    location /super/ {
        alias /usr/share/nginx/html/super/;
        try_files $uri $uri/ /super/index.html;
    }

    # Redirect root to admin
    location = / {
        return 302 /admin/;
    }
}
